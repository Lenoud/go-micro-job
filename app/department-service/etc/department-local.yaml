Name: department.rpc
Mode: dev
ListenOn: 0.0.0.0:9102
Timeout: 2500
CpuThreshold: 900
Health: true

Log:
  Mode: console
  Encoding: plain
  Level: debug
  Stat: true

DevServer:
  Enabled: true
  Host: 127.0.0.1
  Port: 6062
  MetricsPath: /metrics
  HealthPath: /healthz
  EnableMetrics: true
  EnablePprof: true

Middlewares:
  Trace: true
  Recover: true
  Stat: true
  Prometheus: true
  Breaker: true

Telemetry:
  Name: department-service
  Endpoint: 127.0.0.1:4318
  Sampler: 1.0
  Batcher: otlphttp

Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: department.rpc

MySQL:
  DataSource: "go_job:go_job123@tcp(127.0.0.1:3306)/go_job?charset=utf8mb4&parseTime=true&loc=Local"
