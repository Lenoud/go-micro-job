syntax = "proto3";

package department;

option go_package = "./department";

message ActionResp {
  int64 code = 1;
  string msg = 2;
  int64 timestamp = 3;
}

message DepartmentInfo {
  int64 id = 1;
  string title = 2;
  string description = 3;
  int64 parentId = 4;
  string createTime = 5;
}

message DepartmentListData {
  repeated DepartmentInfo list = 1;
  int64 total = 2;
  int64 page = 3;
  int64 pageSize = 4;
}

message DepartmentListResp {
  int64 code = 1;
  string msg = 2;
  DepartmentListData data = 3;
  int64 timestamp = 4;
}

message DepartmentListReq {
  string keyword = 1;
  int64 page = 2;
  int64 pageSize = 3;
  DepartmentContext auth = 4;
}

message CreateDepartmentReq {
  string title = 1;
  string description = 2;
  int64 parentId = 3;
  DepartmentContext auth = 4;
}

message UpdateDepartmentReq {
  int64 id = 1;
  string title = 2;
  string description = 3;
  int64 parentId = 4;
  DepartmentContext auth = 5;
}

message DeleteReq {
  string ids = 1;
  DepartmentContext auth = 2;
}

message DepartmentContext {
  string userId = 1;
  string username = 2;
  string role = 3;
}

service Department {
  rpc List(DepartmentListReq) returns(DepartmentListResp);
  rpc Create(CreateDepartmentReq) returns(ActionResp);
  rpc Update(UpdateDepartmentReq) returns(ActionResp);
  rpc Delete(DeleteReq) returns(ActionResp);
}
