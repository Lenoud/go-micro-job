syntax = "proto3";

package user;

option go_package = "./user";

// ---- 公共响应类型 ----

// 简单操作响应（create/update/delete/register/updateUserInfo/updatePwd）
message ActionResp {
  int64 code = 1;
  string msg = 2;
  int64 timestamp = 3;
}

// 用户信息（login/userLogin/detail 返回 + list 中每一项）
message UserInfo {
  string id         = 1;
  string username   = 2;
  string password   = 3;
  string nickname   = 4;
  string mobile     = 5;
  string email      = 6;
  string role       = 7;
  string status     = 8;
  string token      = 9;
  string createTime = 10;
  string avatar     = 11;
}

// 带用户信息的响应（login/userLogin/detail 共用）
message UserInfoResp {
  int64 code      = 1;
  string msg      = 2;
  UserInfo data   = 3;
  int64 timestamp = 4;
}

// 分页数据
message UserListData {
  repeated UserInfo list = 1;
  int64 total    = 2;
  int64 page     = 3;
  int64 pageSize = 4;
}

// 用户列表响应
message UserListResp {
  int64 code        = 1;
  string msg        = 2;
  UserListData data = 3;
  int64 timestamp   = 4;
}

// ---- 登录 ----
message LoginReq {
  string username = 1;
  string password = 2;
}

message UserLoginReq {
  string username = 1;
  string password = 2;
}

// ---- 注册 ----
message RegisterReq {
  string username   = 1;
  string password   = 2;
  string rePassword = 3;
  string nickname   = 4;
  string mobile     = 5;
  string email      = 6;
}

// ---- 用户详情/列表 ----
message IdReq {
  string id = 1;
  UserContext auth = 2;
}

message UserListReq {
  string keyword  = 1;
  int64  page     = 2;
  int64  pageSize = 3;
  UserContext auth = 4;
}

// ---- 创建用户（管理员） ----
message CreateUserReq {
  string username = 1;
  string password = 2;
  string nickname = 3;
  string mobile   = 4;
  string email    = 5;
  string role     = 6;
  string status   = 7;
  UserContext auth = 8;
}

// ---- 更新用户（管理员） ----
message UpdateUserReq {
  string id         = 1;
  string username   = 2;
  string nickname   = 3;
  string mobile     = 4;
  string email      = 5;
  string role       = 6;
  string status     = 7;
  string password   = 8;
  UserContext auth  = 9;
}

// ---- 用户更新自己的信息 ----
message UpdateUserInfoReq {
  string id         = 1;
  string nickname   = 2;
  string mobile     = 3;
  string email      = 4;
  UserContext auth  = 5;
}

// ---- 修改密码 ----
message UpdatePwdReq {
  string userId      = 1;
  string oldPassword = 2;
  string newPassword = 3;
  UserContext auth   = 4;
}

// ---- 批量删除 ----
message DeleteReq {
  string ids = 1; // 逗号分隔
  UserContext auth = 2;
}

// ---- 用户上下文（从 JWT claims 传递） ----
message UserContext {
  string userId   = 1;
  string username = 2;
  string role     = 3;
}

// ---- RPC 方法 ----
message Empty {}

service User {
  // 无鉴权
  rpc Login(LoginReq)              returns(UserInfoResp);
  rpc UserLogin(UserLoginReq)      returns(UserInfoResp);
  rpc Register(RegisterReq)        returns(ActionResp);

  // 需鉴权（api-gateway 透传 UserContext）
  rpc Detail(IdReq)                returns(UserInfoResp);
  rpc List(UserListReq)            returns(UserListResp);
  rpc Create(CreateUserReq)        returns(ActionResp);
  rpc Update(UpdateUserReq)        returns(ActionResp);
  rpc Delete(DeleteReq)            returns(ActionResp);
  rpc UpdateUserInfo(UpdateUserInfoReq) returns(ActionResp);
  rpc UpdatePwd(UpdatePwdReq)      returns(ActionResp);
}
